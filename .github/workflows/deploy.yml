name: Deploy

on:
    release:
        types: [published]

concurrency:
    group: deploy-production
    cancel-in-progress: true

jobs:
    deploy:
        name: Deploy to Production
        runs-on: ubuntu-latest
        environment: production
        steps:
            - name: Deploy via SSH
              uses: appleboy/ssh-action@v1
              with:
                  host: ${{ secrets.SSH_HOST }}
                  username: ${{ secrets.SSH_USER }}
                  key: ${{ secrets.SSH_KEY }}
                  port: ${{ secrets.SSH_PORT }}
                  script: |
                      set -e
                      cd /var/www/symflowbuilder

                      echo "==> Fetching tags..."
                      git fetch --tags origin

                      echo "==> Checking out ${{ github.event.release.tag_name }}..."
                      git checkout ${{ github.event.release.tag_name }}

                      echo "==> Installing dependencies..."
                      pnpm install --frozen-lockfile

                      echo "==> Generating Prisma client..."
                      pnpm exec prisma generate

                      echo "==> Running migrations..."
                      pnpm exec prisma migrate deploy

                      echo "==> Building..."
                      pnpm run build

                      echo "==> Ensuring logs directory..."
                      mkdir -p /var/www/symflowbuilder/logs
                      chown -R debian:debian /var/www/symflowbuilder/logs

                      echo "==> Restarting service..."
                      export PM2_HOME=/home/debian/.pm2
                      pm2 restart symflowbuilder || pm2 start ecosystem.config.cjs

                      echo "==> Deploy complete! (${{ github.event.release.tag_name }})"
