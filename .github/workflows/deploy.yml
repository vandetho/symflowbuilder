name: Deploy

on:
    release:
        types: [published]

concurrency:
    group: deploy-production
    cancel-in-progress: true

jobs:
    deploy:
        name: Deploy to Production
        runs-on: ubuntu-latest
        environment: production
        steps:
            - name: Deploy via SSH
              uses: appleboy/ssh-action@v1
              with:
                  host: ${{ secrets.SSH_HOST }}
                  username: ${{ secrets.SSH_USER }}
                  key: ${{ secrets.SSH_KEY }}
                  port: ${{ secrets.SSH_PORT }}
                  script: |
                      set -e
                      cd /var/www/symflowbuilder

                      echo "==> Fetching tags..."
                      git fetch --tags origin

                      echo "==> Checking out ${{ github.event.release.tag_name }}..."
                      git checkout ${{ github.event.release.tag_name }}

                      echo "==> Ensuring pnpm is available..."
                      export COREPACK_ENABLE_STRICT=0
                      if ! command -v pnpm &>/dev/null || ! pnpm --version &>/dev/null; then
                          curl -fsSL https://get.pnpm.io/install.sh | sh -
                          export PNPM_HOME="$HOME/.local/share/pnpm"
                          export PATH="$PNPM_HOME:$PATH"
                      fi

                      echo "==> Installing dependencies..."
                      pnpm install --frozen-lockfile

                      echo "==> Generating Prisma client..."
                      pnpm --filter @symflowbuilder/db prisma:generate

                      echo "==> Running migrations..."
                      pnpm --filter @symflowbuilder/db prisma:migrate

                      echo "==> Seeding blog posts..."
                      pnpm prisma:seed

                      echo "==> Building..."
                      pnpm run build

                      echo "==> Ensuring logs directory..."
                      mkdir -p /var/www/symflowbuilder/logs
                      chown -R debian:debian /var/www/symflowbuilder/logs

                      echo "==> Restarting service..."
                      export PM2_HOME=/home/debian/.pm2
                      pm2 delete symflowbuilder 2>/dev/null || true
                      pm2 start ecosystem.config.cjs
                      pm2 save

                      echo "==> Deploy complete! (${{ github.event.release.tag_name }})"
