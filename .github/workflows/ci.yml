name: CI

on:
    pull_request:
        branches: [main]
    push:
        branches: [main]
    workflow_call:

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    lint:
        name: Lint
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm

            - run: npm ci

            - name: Generate Prisma Client
              run: npx prisma generate

            - name: ESLint
              run: npm run lint

            - name: Prettier
              run: npm run format:check

    typecheck:
        name: Type Check
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm

            - run: npm ci

            - name: Generate Prisma Client
              run: npx prisma generate

            - name: TypeScript
              run: npm run typecheck

    build:
        name: Build
        runs-on: ubuntu-latest
        needs: [lint, typecheck]
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: npm

            - run: npm ci

            - name: Generate Prisma Client
              run: npx prisma generate

            - name: Build
              run: npm run build
