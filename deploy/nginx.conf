server {
    listen 80;
    server_name symflowbuilder.com www.symflowbuilder.com;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl; # managed by Certbot
    http2 on;
    listen 443 quic;
    server_name symflowbuilder.com www.symflowbuilder.com;

    # SSL — managed by certbot or manually
    ssl_certificate /etc/letsencrypt/live/symflowbuilder.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/symflowbuilder.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    add_header alt-svc 'h3-27=":443"; ma=86400, h3-28=":443"; ma=86400, h3-29=":443"; ma=86400, h3=":443"; ma=86400';
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;

    # Next.js static assets — long cache
    location /_next/static/ {
        alias /var/www/symflowbuilder/.next/static/;
        expires 365d;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    # Public static files
    location /public/ {
        alias /var/www/symflowbuilder/public/;
        expires 30d;
        access_log off;
    }

    # Favicon
    location /favicon.ico {
        proxy_pass http://127.0.0.1:3003;
        access_log off;
    }

    # Proxy to Next.js
    location / {
        proxy_pass http://127.0.0.1:3003;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}
